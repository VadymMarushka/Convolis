<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convolis</title>
    <base href="/" />

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <!-- icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <style>

        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="min-vh-100 d-flex align-items-center justify-content-center">
            <div class="text-center text-muted">
                <div class="spinner-border mb-3"></div>
                <div>Loading...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-3"
         style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:9999;">
        An unhandled error has occurred.
        <a href="" class="alert-link">Reload</a>
        <span class="float-end" onclick="document.getElementById('blazor-error-ui').style.display='none'">✕</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
